<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social-links-profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="container">
            <img src="images/avatar-jessica.jpeg">
            <h1>
                Jessica Randall
            </h1>
            <h2>
                London, United Kingdom
            </h2>
            <p class="quote">"Front-end developer and avid reader."</p>
            <div class="card-container">
                <div class="card">
                    <p>GitHub</p>
                </div>
                <div class="card">
                    <p>Frontend Mentor</p>
                </div>
                <div class="card">
                    <p>LinkedIn</p>
                </div>
                <div class="card">
                    <p>Twitter</p>
                </div>
                <div class="card">
                    <p>Instagram</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
